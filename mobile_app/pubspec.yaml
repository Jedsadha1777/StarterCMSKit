name: user_app
description: A Flutter article reading application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.2.0
  provider: ^6.1.1
  flutter_secure_storage: ^9.0.0
  jwt_decoder: ^2.0.1
  sqflite: ^2.3.0
  path: ^1.8.3
  connectivity_plus: ^6.0.0
  crypto: ^3.0.3
  uuid: ^4.2.1
  pdf: ^3.10.0
  path_provider: ^2.1.2
  signature: ^5.4.0
  image_picker: ^1.0.7
  file_picker: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
  fonts:
    - family: Cordia New
      fonts:
        - asset: fonts/CordiaNew-Regular.ttf
        - asset: fonts/CordiaNew-Bold.ttf
          weight: 700
        - asset: fonts/CordiaNew-Italic.ttf
          style: italic
        - asset: fonts/CordiaNew-BoldItalic.ttf
          weight: 700
          style: italic
    - family: Calibri
      fonts:
        - asset: fonts/calibril.ttf
          weight: 300
        - asset: fonts/calibrili.ttf
          weight: 300
          style: italic
        - asset: fonts/calibri.ttf
          weight: 400
        - asset: fonts/calibrii.ttf
          weight: 400
          style: italic
        - asset: fonts/calibrib.ttf
          weight: 700
        - asset: fonts/calibriz.ttf
          weight: 700
          style: italic